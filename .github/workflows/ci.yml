name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Export locked dependencies
        run: |
          uv export --frozen --no-hashes --no-emit-project \
            --format requirements-txt \
            --output-file /tmp/notion-nilo-audit-requirements.txt

      - name: Audit locked dependencies
        run: |
          uvx --python 3.12 --from pip-audit==2.10.1 pip-audit \
            -r /tmp/notion-nilo-audit-requirements.txt \
            --progress-spinner off

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      UV_PROJECT_ENVIRONMENT: /tmp/nilo-ci-${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Run tests
        run: uv run pytest -q -p no:cacheprovider

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src

      - name: Build docs site
        run: python scripts/build_docs_site.py --source Docs --output /tmp/notion-nilo-docs-site

      - name: Build package
        run: uv build --out-dir /tmp/notion-nilo-dist
